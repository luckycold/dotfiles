# Make OpenCode auto-load the generated open-cursor (cursor-acp) model catalog.
# The file is produced by the opencode-cursor-sync.timer and is gitignored.
# OpenCode merges this as an extra config on top of ~/.config/opencode/opencode.json.
# A missing path is tolerated (OpenCode falls back to the committed config), so this
# is safe to set unconditionally even before the first sync has run.
OPENCODE_CONFIG=${HOME}/.config/opencode/open-cursor.generated.json
