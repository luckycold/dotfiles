# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

scrolling {
    # Let mouse focus pull mostly-hidden columns into view.
    follow_focus = true
    follow_min_visible = 0.0
}

misc {
    # Variable Refresh Rate
    vrr = 0
}

render {
    # Auto-switch to HDR mode when a fullscreen app uses HDR.
    cm_auto_hdr = 1
}

xwayland {
    # Avoid nearest-neighbor filtering that can make scaled XWayland apps jagged.
    use_nearest_neighbor = 0
}

# Keep active windows fully opaque while preserving inactive dimming.
windowrule = opacity 1 0.9, match:tag default-opacity
windowrule = opacity 1 0.9, match:tag terminal

binds {
  window_direction_monitor_fallback = true
}
